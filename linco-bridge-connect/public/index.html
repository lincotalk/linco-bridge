<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linco × Agent</title>
  <style>
    :root {
      --primary: #1677ff;
      --primary-hover: #0958d9;
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --user-bubble: #1677ff;
      --assistant-bubble: #f8fafc;
      --system-color: #475569;
      --danger: #ff4d4f;
      --text-dark: #172033;
      --text-light: #fff;
      --border: #d9e2ee;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      background: #e9edf3;
      overflow: auto;
    }

    #chat-container {
      width: 100%;
      max-width: 860px;
      height: min(95vh, 100vh);
      height: min(95dvh, 100dvh);
      max-height: 100vh;
      max-height: 100dvh;
      min-height: 0;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 10px 36px rgba(15, 23, 42, 0.12);
      display: flex;
      flex-direction: column;
      overflow: clip;
    }

    #header {
      padding: 14px 20px;
      background: #1a1a2e;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #52c41a;
      margin-left: auto;
      transition: background 0.3s;
    }
    #status-dot.disconnected { background: #ff4d4f; }

    #agent-select {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 13px;
      outline: none;
    }

    #agent-select option { color: #333; }

    #messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        linear-gradient(180deg, rgba(248,250,252,0.82), rgba(255,255,255,0.94)),
        #fff;
    }

    @media (max-width: 640px) {
      body {
        align-items: stretch;
        overflow: hidden;
      }

      #chat-container {
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
      }
    }

    .message {
      max-width: min(92%, 760px);
      padding: 10px 13px;
      border-radius: 10px;
      line-height: 1.62;
      font-size: 14px;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: pre-wrap;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: var(--text-light);
      border-bottom-right-radius: 5px;
      box-shadow: 0 2px 8px rgba(22, 119, 255, 0.22);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bubble);
      color: var(--text-dark);
      border-bottom-left-radius: 5px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .message.assistant.markdown {
      white-space: normal;
      line-height: 1.72;
    }
    .message.assistant.markdown > :first-child { margin-top: 0; }
    .message.assistant.markdown > :last-child { margin-bottom: 0; }
    .message.assistant.markdown p { margin: 0 0 0.8em; }
    .message.assistant.markdown h1,
    .message.assistant.markdown h2,
    .message.assistant.markdown h3,
    .message.assistant.markdown h4 {
      margin: 1em 0 0.5em;
      line-height: 1.35;
      color: #1f2f46;
      font-weight: 700;
    }
    .message.assistant.markdown h1 { font-size: 20px; }
    .message.assistant.markdown h2 {
      font-size: 18px;
      padding-bottom: 5px;
      border-bottom: 1px solid #e4edff;
    }
    .message.assistant.markdown h3 {
      font-size: 16px;
      color: #244266;
    }
    .message.assistant.markdown h4 { font-size: 15px; }
    .message.assistant.markdown ul,
    .message.assistant.markdown ol {
      margin: 0 0 0.85em 1.25em;
      padding: 0;
    }
    .message.assistant.markdown li {
      margin: 0.28em 0;
      padding-left: 0.15em;
    }
    .message.assistant.markdown li::marker { color: #1677ff; }
    .message.assistant.markdown blockquote {
      margin: 0.85em 0;
      padding: 0.35em 0 0.35em 0.9em;
      border-left: 3px solid #b7d1ff;
      color: #5b7594;
      background: rgba(22,119,255,0.04);
      border-radius: 0 8px 8px 0;
    }
    .message.assistant.markdown code {
      padding: 0.12em 0.35em;
      border-radius: 4px;
      background: rgba(22,119,255,0.08);
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 0.92em;
    }
    .message.assistant.markdown pre {
      margin: 0.85em 0;
      padding: 11px;
      border-radius: 9px;
      background: #fff;
      border: 1px solid var(--border);
      overflow-x: auto;
      white-space: pre;
      box-shadow: inset 0 0 0 1px rgba(22,119,255,0.03);
    }
    .message.assistant.markdown pre code {
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: 12px;
    }
    .message.assistant.markdown table {
      display: block;
      width: 100%;
      margin: 0.85em 0;
      overflow-x: auto;
      border-collapse: collapse;
      font-size: 13px;
    }
    .message.assistant.markdown th,
    .message.assistant.markdown td {
      padding: 7px 9px;
      border: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    .message.assistant.markdown th { background: #eef5ff; }
    .message.assistant.markdown strong {
      color: #1f2f46;
      font-weight: 700;
    }
    .message.assistant.markdown hr {
      height: 1px;
      margin: 1em 0;
      border: 0;
      background: linear-gradient(90deg, transparent, #d9e6ff, transparent);
    }
    .message.assistant.markdown p:has(> strong:first-child) {
      padding: 8px 10px;
      border: 1px solid #d9e6ff;
      border-radius: 10px;
      background: #f8fbff;
    }
    .message.assistant.markdown a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .message.assistant.markdown a:hover { text-decoration: underline; }

    .message.assistant.assistant-turn {
      width: min(88%, 720px);
      max-width: min(88%, 720px);
      padding: 0;
      overflow: hidden;
    }
    .assistant-content {
      padding: 10px 14px;
      min-height: 20px;
    }
    .assistant-content:empty {
      display: none;
    }

    .agent-action-panel {
      display: none;
      border-bottom: 1px solid #dce8fb;
      background: #fbfdff;
    }
    .agent-action-panel.active {
      display: block;
    }
    .agent-action-details {
      width: 100%;
    }
    .agent-action-summary {
      min-height: 34px;
      padding: 7px 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      cursor: pointer;
      list-style: none;
      font-size: 12px;
      user-select: none;
    }
    .agent-action-summary::-webkit-details-marker {
      display: none;
    }
    .agent-task-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      flex: 0 0 auto;
    }
    .agent-action-panel.is-running .agent-task-dot {
      background: #1677ff;
      animation: statusPulse 1.2s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 0.45; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .agent-action-summary-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .agent-action-count {
      color: #64748b;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 11px;
      flex-shrink: 0;
    }
    .agent-action-list {
      border-top: 1px solid #e7eefb;
      display: flex;
      flex-direction: column;
    }
    .agent-action-item {
      padding: 8px 11px;
      border-top: 1px solid #edf3fd;
      font-size: 12px;
      color: #334155;
    }
    .agent-action-item:first-child {
      border-top: 0;
    }
    .agent-action-main {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 22px;
    }
    .agent-action-kind {
      color: #1677ff;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .agent-action-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .agent-action-state {
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
    }
    .agent-action-item.is-success .agent-action-state {
      color: #16a34a;
    }
    .agent-action-item.is-failed .agent-action-state {
      color: #cf1322;
    }
    .agent-action-thinking {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      color: #475569;
      line-height: 1.5;
    }
    .agent-action-thinking-kind {
      color: #8b5cf6;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 11px;
      font-weight: 700;
    }
    .agent-action-thinking-text {
      min-width: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .agent-action-io {
      margin: 6px 0 0 66px;
      color: #64748b;
    }
    .agent-action-io summary {
      cursor: pointer;
      font-size: 12px;
    }
    .agent-action-io pre {
      margin: 6px 0 0;
      padding: 8px;
      background: #fff;
      border: 1px solid #e4edff;
      border-radius: 6px;
      color: #26384d;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow: auto;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 11px;
    }

    .message.system {
      align-self: center;
      width: min(94%, 720px);
      max-width: min(94%, 720px);
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.58;
      color: var(--system-color);
      background: #f8fafc;
      border: 1px solid #dbe4ef;
      border-left: 3px solid #1677ff;
      border-radius: 8px;
      text-align: left;
      white-space: normal;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }
    .message.system.is-status {
      width: fit-content;
      max-width: min(94%, 640px);
      border-left-color: #22c55e;
      background: #f8fffb;
    }
    .system-lines {
      display: grid;
      gap: 3px;
    }
    .system-line {
      display: block;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .system-line:first-child {
      color: #1f2f46;
      font-weight: 650;
    }
    .system-line.is-muted {
      color: #64748b;
    }
    .system-line.is-path,
    .system-line.is-command {
      padding: 2px 6px;
      border-radius: 5px;
      background: #eef5ff;
      color: #244266;
      font-family: 'SF Mono', 'Menlo', 'Monaco', Consolas, monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    .presence-grid {
      display: grid;
      gap: 5px;
    }
    .presence-title {
      color: #1f2f46;
      font-weight: 650;
    }
    .presence-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 8px;
      align-items: baseline;
      font-size: 12px;
    }
    .presence-label {
      color: #64748b;
    }
    .presence-value {
      overflow-wrap: anywhere;
      word-break: break-word;
      color: #26384d;
      font-family: 'SF Mono', 'Menlo', 'Monaco', Consolas, monospace;
    }

    .message.error {
      align-self: center;
      font-size: 12px;
      color: var(--danger);
      background: #fff2f0;
      border: 1px solid #ffccc7;
      border-radius: 8px;
      padding: 8px 14px;
    }

    .message.tool_call {
      align-self: center;
      font-size: 12px;
      background: #fffbe6;
      border: 1px solid #ffe58f;
      border-radius: 8px;
      padding: 8px 14px;
      color: #ad8b00;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    }

    .reasoning-card {
      align-self: flex-start;
      width: fit-content;
      min-width: 156px;
      max-width: min(88%, 640px);
      margin: 2px 0 -2px 0;
      border: 1px solid #d5e3f8;
      border-radius: 8px;
      background: #f8fbff;
      color: #334155;
      font-size: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
      animation: fadeIn 0.2s ease;
    }
    .reasoning-card.active {
      border-color: #9fc3ff;
      background: #f5f9ff;
    }
    .reasoning-card-header {
      width: 100%;
      padding: 6px 10px;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font: inherit;
      font-weight: 600;
      text-align: left;
    }
    .reasoning-card-toggle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e6f0ff;
      color: #1677ff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      transition: transform 0.18s ease;
      flex-shrink: 0;
    }
    .reasoning-card.collapsed .reasoning-card-toggle { transform: rotate(-90deg); }
    .reasoning-card-title {
      flex-shrink: 0;
      color: #1f2f46;
    }
    .reasoning-card-preview {
      flex: 1;
      color: #64748b;
      font-weight: 400;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .reasoning-card-badge {
      padding: 2px 7px;
      border-radius: 999px;
      background: #e6f0ff;
      color: #1677ff;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .reasoning-card-body {
      border-top: 1px solid rgba(22,119,255,0.12);
      padding: 9px 11px 10px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
      max-height: 96px;
      overflow: auto;
    }
    .reasoning-card.collapsed .reasoning-card-body { display: none; }

    .tool-card {
      align-self: flex-start;
      width: min(92%, 720px);
      margin: 4px 0 -2px 0;
      border: 1px solid #d9e6ff;
      border-radius: 12px;
      background: linear-gradient(180deg, #f8fbff 0%, #f3f7ff 100%);
      color: #244266;
      font-size: 12px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(22, 119, 255, 0.08);
    }
    .tool-card.error {
      border-color: #ffccc7;
      background: linear-gradient(180deg, #fff7f6 0%, #fff2f0 100%);
      color: #a8071a;
    }
    .tool-card-header {
      width: 100%;
      cursor: pointer;
      padding: 9px 12px;
      font-weight: 600;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      font: inherit;
    }
    .tool-card-toggle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e6f0ff;
      color: #1677ff;
      font-size: 16px;
      line-height: 1;
      transition: transform 0.18s ease;
      flex-shrink: 0;
    }
    .tool-card.collapsed .tool-card-toggle { transform: rotate(-90deg); }
    .tool-card.collapsed .tool-card-body { display: none; }
    .tool-card-summary-main {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tool-card-summary-badge {
      padding: 2px 7px;
      border-radius: 999px;
      background: #e6f0ff;
      color: #1677ff;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .tool-card.error .tool-card-summary-badge,
    .tool-card.error .tool-card-toggle {
      background: #fff1f0;
      color: #cf1322;
    }
    .tool-card-body {
      display: block;
    }
    .tool-section {
      border-top: 1px solid rgba(22,119,255,0.12);
      padding: 9px 12px 11px;
    }
    .tool-section-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: #5b7594;
    }
    .tool-card.error .tool-section-title { color: #a8071a; }
    .tool-section pre {
      margin: 0;
      padding: 10px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(22,119,255,0.08);
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 260px;
      overflow: auto;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      color: #26384d;
    }

    .outgoing-card {
      align-self: flex-start;
      width: min(88%, 520px);
      padding: 12px;
      border: 1px solid #d9e6ff;
      border-radius: 12px;
      background: #f8fbff;
      box-shadow: 0 3px 12px rgba(22, 119, 255, 0.08);
      display: flex;
      gap: 12px;
      align-items: center;
      animation: fadeIn 0.2s ease;
    }
    .outgoing-card.error {
      border-color: #ffccc7;
      background: #fff2f0;
      color: #cf1322;
    }
    .outgoing-preview {
      width: 72px;
      height: 72px;
      border-radius: 10px;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #fff;
      flex-shrink: 0;
    }
    .outgoing-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: #e6f0ff;
      color: #1677ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .outgoing-info {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: #5b7594;
    }
    .outgoing-name {
      font-size: 14px;
      color: #244266;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .outgoing-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .outgoing-link {
      color: #1677ff;
      text-decoration: none;
      font-weight: 600;
    }
    .outgoing-link:hover { text-decoration: underline; }

    .message-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .message-action-btn {
      border: 1px solid #c8d7ea;
      background: #f7fbff;
      color: #244266;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.2;
      cursor: pointer;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .message-action-btn:hover {
      border-color: #1677ff;
      color: #0958d9;
      background: #eef6ff;
    }
    .message-action-btn:disabled {
      cursor: default;
      opacity: 0.55;
    }

    .slash-result {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-self: center;
      width: min(94%, 720px);
      max-width: min(94%, 720px);
      padding: 12px;
      color: #244266;
      background: #f8fafc;
      border: 1px solid #dbe4ef;
      border-left: 3px solid #1677ff;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .slash-result-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: #1f2f46;
      font-weight: 650;
    }
    .slash-result-meta {
      color: #64748b;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .slash-result-list,
    .history-rounds {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .slash-result-item,
    .history-round {
      border: 1px solid #dbe4ef;
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      min-width: 0;
    }
    .slash-result-title {
      color: #1f2f46;
      font-weight: 650;
      overflow-wrap: anywhere;
    }
    .slash-result-subtitle,
    .history-role {
      color: #64748b;
      font-size: 12px;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }
    .history-block + .history-block {
      margin-top: 8px;
    }
    .history-role {
      margin-bottom: 3px;
      font-weight: 650;
      text-transform: uppercase;
    }
    .history-text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #244266;
    }

    .message.user img {
      max-width: 180px;
      border-radius: 8px;
      margin-top: 6px;
      display: block;
      border: 1px solid rgba(255,255,255,0.35);
    }

    .file-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      opacity: 0.95;
    }

    .danger-confirm {
      align-self: center;
      background: #fff2f0;
      border: 2px solid #ff4d4f;
      border-radius: 10px;
      padding: 14px 18px;
      max-width: 90%;
    }
    .danger-confirm .danger-text {
      color: #cf1322;
      font-size: 13px;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
    .danger-confirm .danger-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .danger-confirm button {
      padding: 6px 16px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 500;
    }
    .btn-approve { background: #ff4d4f; color: #fff; }
    .btn-approve:hover { background: #cf1322; }
    .btn-deny { background: #f5f5f5; color: #666; border: 1px solid #d9d9d9; }
    .btn-deny:hover { background: #e8e8e8; }
    .permission-confirm {
      background: #eef6ff;
      border-color: #1677ff;
    }
    .permission-confirm .danger-text { color: #0958d9; }
    .permission-confirm .btn-approve { background: #1677ff; }
    .permission-confirm .btn-approve:hover { background: #0958d9; }

    #attachment-bar {
      display: none;
      padding: 8px 16px;
      border-top: 1px solid #dbe4ef;
      background: #f8fafc;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    #attachment-bar.active { display: flex; }
    .attachment-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      max-width: 260px;
      font-size: 12px;
      color: #555;
    }
    .attachment-chip img {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .attachment-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .remove-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      flex-shrink: 0;
    }

    #input-area {
      display: flex;
      padding: 12px 16px;
      border-top: 1px solid #dbe4ef;
      gap: 8px;
      flex-shrink: 0;
      background: #f8fafc;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      resize: none;
      font-family: inherit;
      transition: border-color 0.2s;
      max-height: 120px;
      color: #172033;
      background: #fff;
    }
    #input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #upload-btn { background: #f5f5f5; color: #666; }
    #upload-btn:hover { background: #e8e8e8; }

    #send-btn {
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #send-btn:hover { background: var(--primary-hover); }
    #send-btn.is-stop { background: var(--danger); }
    #send-btn.is-stop:hover { background: #d9363e; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #bbb; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="header">
      <span id="header-title">🤖 Linco · Agent</span>
      <span id="status-dot" title="连接状态"></span>
      <select id="agent-select" title="选择本地测试 Agent">
        <option value="claude">Claude Code</option>
        <option value="codex">Codex</option>
        <option value="hermes">Hermes</option>
        <option value="openclaw">OpenClaw</option>
      </select>
    </div>
    <div id="messages"></div>
    <div id="attachment-bar"></div>
    <div id="input-area">
      <button id="upload-btn" class="icon-btn" title="上传附件">📎</button>
      <input type="file" id="file-input" multiple hidden>
      <textarea id="input" rows="2" placeholder="输入消息，Enter 发送，Shift+Enter 换行...&#10;支持 csv、xlsx、sql、图片、PDF、Word 等普通文件"></textarea>
      <button id="send-btn" disabled>发送</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script>
    let ws = null;
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const agentSelect = document.getElementById('agent-select');
    const uploadBtn = document.getElementById('upload-btn');
    const fileInput = document.getElementById('file-input');
    const attachmentBar = document.getElementById('attachment-bar');

    const uploadLimits = {
      maxCount: 50,
      maxFileBytes: 50 * 1024 * 1024,
      maxTotalBytes: 250 * 1024 * 1024,
      blockedExtensions: ['.exe', '.msi', '.dll', '.com', '.scr', '.bat', '.cmd', '.ps1', '.vbs', '.hta', '.lnk', '.url', '.reg', '.cpl'],
    };

    let connected = false;
    let isRunning = false;
    let currentSessionId = '';
    let currentSessionIdSource = '';
    let currentSessionKey = '';
    let currentAgentType = loadAgentTypeFromUrlOrStorage();
    let reconnectTimer = null;
    let localToken = loadLocalToken();
    let currentAssistantMsg = null;
    let currentAssistantTurn = null;
    let thinkingMsg = null;
    let thinkingText = '';
    let currentTurnActions = [];
    let currentTurnActionSeq = 0;
    let pendingAttachments = [];
    let assistantBuffer = '';
    let currentAssistantMarkdown = '';
    let assistantFrame = null;
    let autoFollowMessages = true;
    const inlineSlashStreamIds = new Set();
    const outgoingObjectUrls = new Set();

    window.addEventListener('beforeunload', () => {
      for (const url of outgoingObjectUrls) URL.revokeObjectURL(url);
      outgoingObjectUrls.clear();
    });

    function isNearBottom() {
      return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
    }

    function scrollToBottom(options = {}) {
      if (!options.force && !autoFollowMessages) return;
      messagesEl.scrollTop = messagesEl.scrollHeight;
      autoFollowMessages = true;
    }

    messagesEl.addEventListener('scroll', () => {
      autoFollowMessages = isNearBottom();
    }, { passive: true });

    function addMessage(type, text, extra = {}) {
      const shouldFollow = autoFollowMessages || isNearBottom();
      const div = document.createElement('div');
      div.className = `message ${type}`;

      if (type === 'assistant') {
        div.classList.add('markdown');
        renderAssistantMarkdown(div, text);
      } else if (type === 'system') {
        renderSystemMessage(div, text);
      } else {
        const textNode = document.createElement('span');
        textNode.textContent = text;
        div.appendChild(textNode);
      }

      if (extra.attachments?.length) {
        const list = document.createElement('div');
        list.className = 'file-list';
        for (const file of extra.attachments) {
          if (file.mimeType?.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = `data:${file.mimeType};base64,${file.base64}`;
            img.alt = file.name;
            list.appendChild(img);
          } else {
            const item = document.createElement('div');
            item.textContent = `📄 ${file.name} (${formatSize(file.size)})`;
            list.appendChild(item);
          }
        }
        div.appendChild(list);
      }

      const actions = normalizeMessageActions(extra.actions || extra.quickActions || extra.quickReplies);
      if (actions.length) {
        div.appendChild(createMessageActions(actions));
      }

      messagesEl.appendChild(div);
      if (type === 'user' || shouldFollow) scrollToBottom({ force: true });
      return div;
    }

    function addPresenceMessage(data) {
      const device = data.device || {};
      const client = data.client || {};
      const div = document.createElement('div');
      div.className = 'message system is-status';

      const grid = document.createElement('div');
      grid.className = 'presence-grid';
      appendPresenceTitle(grid, `${agentLabel(data.from || currentAgentType)} ${data.status === 'offline' ? '已离线' : '已上线'}`);
      appendPresenceRow(grid, '设备名', device.name || '-');
      appendPresenceRow(grid, '设备ID', device.id || '-');
      appendPresenceRow(grid, '平台', [device.platform, device.arch].filter(Boolean).join(' / ') || '-');
      appendPresenceRow(grid, '客户端', [client.name, client.version].filter(Boolean).join(' ') || '-');
      if (data.reason) appendPresenceRow(grid, '原因', data.reason);

      div.appendChild(grid);
      messagesEl.appendChild(div);
      scrollToBottom({ force: true });
    }

    function appendPresenceTitle(parent, text) {
      const item = document.createElement('div');
      item.className = 'presence-title';
      item.textContent = text;
      parent.appendChild(item);
    }

    function appendPresenceRow(parent, label, value) {
      const row = document.createElement('div');
      row.className = 'presence-row';
      const labelEl = document.createElement('span');
      labelEl.className = 'presence-label';
      labelEl.textContent = label;
      const valueEl = document.createElement('span');
      valueEl.className = 'presence-value';
      valueEl.textContent = String(value || '-');
      row.appendChild(labelEl);
      row.appendChild(valueEl);
      parent.appendChild(row);
    }

    function renderSystemMessage(container, text) {
      const raw = String(text || '');
      const lines = raw.split(/\r?\n/);
      if (isStatusSystemMessage(raw)) container.classList.add('is-status');

      const wrapper = document.createElement('div');
      wrapper.className = 'system-lines';

      for (const line of lines) {
        const item = document.createElement('span');
        item.className = 'system-line';
        if (!line.trim()) {
          item.classList.add('is-muted');
          item.textContent = '';
        } else {
          if (isPathLikeLine(line)) item.classList.add('is-path');
          if (isCommandLikeLine(line)) item.classList.add('is-command');
          item.textContent = line;
        }
        wrapper.appendChild(item);
      }

      container.appendChild(wrapper);
    }

    function isStatusSystemMessage(text) {
      return /已连接|连接已断开|正在尝试重连|工作目录|输入 \/help|Connected|disconnected|reconnect/i.test(text || '');
    }

    function isPathLikeLine(line) {
      const value = String(line || '').trim();
      return /^[A-Za-z]:\\/.test(value) || value.includes('\\workspace') || value.includes('/workspace') || value.includes('/sessions/');
    }

    function isCommandLikeLine(line) {
      return /(^|\s)\/[a-z][\w-]*(\s|$)/i.test(String(line || ''));
    }

    function normalizeMessageActions(actions) {
      if (!Array.isArray(actions)) return [];
      return actions
        .map(action => {
          if (typeof action === 'string') return { label: action, command: action };
          if (!action || typeof action !== 'object') return null;
          const command = String(action.command || action.text || action.value || '').trim();
          const label = String(action.label || action.title || command || '').trim();
          return command && label ? { ...action, command, label } : null;
        })
        .filter(Boolean)
        .slice(0, 40);
    }

    function createMessageActions(actions) {
      const container = document.createElement('div');
      container.className = 'message-actions';

      for (const action of actions) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'message-action-btn';
        button.textContent = action.label;
        button.title = action.command;
        button.addEventListener('click', () => {
          sendTextMessage(action.command);
        });
        container.appendChild(button);
      }

      return container;
    }

    function addSlashCommandResult(result) {
      const shouldFollow = autoFollowMessages || isNearBottom();
      const command = String(result?.command || '').trim();
      const data = result?.data && typeof result.data === 'object' ? result.data : {};
      if (command === 'history' && data.replaceConversation) {
        replaceConversationWithHistory(data);
        return null;
      }
      const card = document.createElement('div');
      card.className = 'slash-result';

      const header = document.createElement('div');
      header.className = 'slash-result-header';
      const title = document.createElement('div');
      title.textContent = slashCommandTitle(command);
      const meta = document.createElement('div');
      meta.className = 'slash-result-meta';
      meta.textContent = slashCommandMeta(command, data);
      header.appendChild(title);
      if (meta.textContent) header.appendChild(meta);
      card.appendChild(header);

      if (command === 'history') {
        renderHistoryResult(card, data);
      } else if (command === 'help') {
        renderListResult(card, data.items || [], {
          emptyText: '没有可用命令',
          title: item => item.label || item.command || '(command)',
          subtitle: item => item.description || '',
          command: () => '',
          commandLabel: () => 'Send',
        });
        renderHelpNotes(card, data.notes);
      } else if (command === 'sessions') {
        renderListResult(card, data.items || [], {
          emptyText: '没有找到可接入的 session',
          title: item => item.title || item.id || '(untitled)',
          subtitle: item => [
            item.id ? `ID: ${item.id}` : '',
            item.updatedAtText ? `更新时间: ${item.updatedAtText}` : '',
          ].filter(Boolean).join('\n'),
          command: item => item.bindCommand,
          commandLabel: () => 'Bind session',
        });
      } else if (command === 'project') {
        renderListResult(card, data.items || [], {
          emptyText: '没有找到已知项目',
          title: item => item.label || item.path || '(project)',
          subtitle: item => item.path || '',
          command: item => item.command,
          commandLabel: () => 'Select project',
        });
      } else if (command === 'chats') {
        renderListResult(card, data.items || [], {
          emptyText: 'No Codex chats found',
          title: item => item.title || item.firstMessage || item.id || '(chat)',
          subtitle: item => [
            item.id ? `ID: ${item.id}` : '',
            item.updatedAtText ? `Updated: ${item.updatedAtText}` : '',
            item.workspace || '',
          ].filter(Boolean).join('\n'),
          command: item => item.bindCommand,
          commandLabel: () => 'Bind chat',
        });
      } else if (command === 'agent') {
        renderListResult(card, data.items || [], {
          emptyText: '没有可选 Agent',
          title: item => `${item.id || '(agent)'}${item.isCurrent ? ' (current)' : ''}${item.isDefault ? ' (default)' : ''}`,
          subtitle: item => [item.model ? `model: ${item.model}` : '', item.workspace || item.agentDir || ''].filter(Boolean).join('\n'),
          command: item => item.command,
          commandLabel: () => 'Bind agent',
        });
      } else if (command === 'profile') {
        renderListResult(card, data.items || [], {
          emptyText: '没有可选 Profile',
          title: item => `${item.name || '(profile)'}${item.isCurrent ? ' (current)' : ''}${item.isDefault ? ' (default)' : ''}`,
          subtitle: () => '',
          command: item => item.command,
          commandLabel: () => 'Bind profile',
        });
      } else {
        const pre = document.createElement('pre');
        pre.className = 'history-text';
        pre.textContent = JSON.stringify(data, null, 2);
        card.appendChild(pre);
      }

      messagesEl.appendChild(card);
      if (shouldFollow) scrollToBottom({ force: true });
      return card;
    }

    function replaceConversationWithHistory(data) {
      clearRenderedConversation();
      currentSessionKey = data.agentSessionId || currentSessionKey;
      const rounds = Array.isArray(data.rounds) ? data.rounds : [];
      if (!rounds.length) {
        addMessage('system', '当前 session 暂无可展示的聊天历史');
        return;
      }
      for (const round of rounds) {
        addMessage('user', round.user?.text || '');
        if (!round.assistant?.missing) addMessage('assistant', round.assistant?.text || '');
      }
      scrollToBottom({ force: true });
    }

    function clearRenderedConversation() {
      messagesEl.textContent = '';
      currentAssistantMsg = null;
      currentAssistantTurn = null;
      thinkingMsg = null;
      thinkingText = '';
      currentTurnActions = [];
      assistantBuffer = '';
      currentAssistantMarkdown = '';
      if (assistantFrame) cancelAnimationFrame(assistantFrame);
      assistantFrame = null;
      inlineSlashStreamIds.clear();
      autoFollowMessages = true;
    }

    function slashCommandTitle(command) {
      if (command === 'history') return '聊天历史';
      if (command === 'help') return '可用命令';
      if (command === 'sessions') return '本地 Sessions';
      if (command === 'project') return '已知项目';
      if (command === 'chats') return 'Codex Chats';
      if (command === 'agent') return 'OpenClaw Agent';
      if (command === 'profile') return 'Hermes Profile';
      return `Slash command: ${command || 'unknown'}`;
    }

    function slashCommandMeta(command, data) {
      if (command === 'history') return `${data.agentType || ''} ${data.returnedRounds || 0}/${data.requestedLimit || 0}`.trim();
      if (command === 'help') return `${data.agentType || ''} ${data.returnedCount || (data.items || []).length || 0} items`.trim();
      if (command === 'sessions') return `${data.agentType || ''} ${data.returnedCount || 0}/${data.requestedLimit || 0}`.trim();
      if (command === 'project') return `${(data.items || []).length} items`;
      if (command === 'chats') return `${data.returnedCount || 0}/${data.requestedLimit || 0}`;
      if (command === 'agent') return data.current ? `current: ${data.current}` : '';
      if (command === 'profile') return data.current ? `current: ${data.current}` : '';
      return '';
    }

    function renderHistoryResult(card, data) {
      const rounds = Array.isArray(data.rounds) ? data.rounds : [];
      if (!rounds.length) {
        appendSlashEmpty(card, '暂无可展示的聊天历史');
        return;
      }
      const list = document.createElement('div');
      list.className = 'history-rounds';
      for (const round of rounds) {
        const item = document.createElement('div');
        item.className = 'history-round';
        appendHistoryBlock(item, 'User', round.user?.text || '');
        appendHistoryBlock(item, 'Assistant', round.assistant?.missing ? '(无最终输出)' : (round.assistant?.text || ''));
        list.appendChild(item);
      }
      card.appendChild(list);
    }

    function appendHistoryBlock(container, role, text) {
      const block = document.createElement('div');
      block.className = 'history-block';
      const label = document.createElement('div');
      label.className = 'history-role';
      label.textContent = role;
      const body = document.createElement('div');
      body.className = 'history-text';
      body.textContent = text || '(empty)';
      block.appendChild(label);
      block.appendChild(body);
      container.appendChild(block);
    }

    function renderListResult(card, items, options) {
      if (!Array.isArray(items) || !items.length) {
        appendSlashEmpty(card, options.emptyText || '暂无数据');
        return;
      }
      const list = document.createElement('div');
      list.className = 'slash-result-list';
      for (const item of items) {
        const row = document.createElement('div');
        row.className = 'slash-result-item';
        const title = document.createElement('div');
        title.className = 'slash-result-title';
        title.textContent = options.title(item);
        row.appendChild(title);
        const subtitleText = options.subtitle(item);
        if (subtitleText) {
          const subtitle = document.createElement('div');
          subtitle.className = 'slash-result-subtitle';
          subtitle.textContent = subtitleText;
          row.appendChild(subtitle);
        }
        const command = String(options.command(item) || '').trim();
        if (command) {
          row.appendChild(createMessageActions([{ label: options.commandLabel(item), command }]));
        }
        list.appendChild(row);
      }
      card.appendChild(list);
    }

    function renderHelpNotes(card, notes) {
      if (!Array.isArray(notes) || !notes.length) return;
      const list = document.createElement('div');
      list.className = 'slash-result-list';
      for (const noteText of notes) {
        const row = document.createElement('div');
        row.className = 'slash-result-item';
        const note = document.createElement('div');
        note.className = 'slash-result-subtitle';
        note.textContent = String(noteText || '');
        row.appendChild(note);
        list.appendChild(row);
      }
      card.appendChild(list);
    }

    function appendSlashEmpty(card, text) {
      const empty = document.createElement('div');
      empty.className = 'slash-result-subtitle';
      empty.textContent = text;
      card.appendChild(empty);
    }

    function renderAssistantMarkdown(el, rawText) {
      if (!el) return;

      if (!window.marked || !window.DOMPurify) {
        el.textContent = rawText || '';
        return;
      }

      try {
        const html = marked.parse(rawText || '', {
          breaks: true,
          gfm: true,
        });
        el.innerHTML = DOMPurify.sanitize(html, {
          ALLOWED_URI_REGEXP: /^(?:(?:https?|mailto):|[^a-z]|[a-z+.-]+(?:[^a-z+.-:]|$))/i,
        });
        for (const link of el.querySelectorAll('a[href]')) {
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
        }
      } catch {
        el.textContent = rawText || '';
      }
    }

    function removeMessage(el) {
      if (el) {
        el.remove();
        scrollToBottom();
      }
    }

    function ensureAssistantTurn() {
      if (currentAssistantTurn?.container?.isConnected) return currentAssistantTurn;

      currentAssistantMarkdown = '';
      currentTurnActions = [];
      currentTurnActionSeq = 0;
      thinkingText = '';

      const container = document.createElement('div');
      container.className = 'message assistant markdown assistant-turn';

      const actionPanel = createActionPanel();
      const content = document.createElement('div');
      content.className = 'assistant-content';
      content.dataset.role = 'final-answer';

      container.appendChild(actionPanel.panel);
      container.appendChild(content);
      messagesEl.appendChild(container);

      currentAssistantMsg = content;
      currentAssistantTurn = {
        container,
        actionPanel: actionPanel.panel,
        actionDetails: actionPanel.details,
        actionSummaryText: actionPanel.summaryText,
        actionCount: actionPanel.count,
        actionList: actionPanel.list,
      };
      scrollToBottom();
      return currentAssistantTurn;
    }

    function createActionPanel() {
      const panel = document.createElement('div');
      panel.className = 'agent-action-panel is-running';

      const details = document.createElement('details');
      details.className = 'agent-action-details';
      details.open = true;

      const summary = document.createElement('summary');
      summary.className = 'agent-action-summary';

      const dot = document.createElement('span');
      dot.className = 'agent-task-dot';

      const summaryText = document.createElement('span');
      summaryText.className = 'agent-action-summary-text';
      summaryText.textContent = 'Thinking...';

      const count = document.createElement('span');
      count.className = 'agent-action-count';

      const list = document.createElement('div');
      list.className = 'agent-action-list';

      summary.appendChild(dot);
      summary.appendChild(summaryText);
      summary.appendChild(count);
      details.appendChild(summary);
      details.appendChild(list);
      panel.appendChild(details);
      return { panel, details, summaryText, count, list };
    }

    function completeAssistantTurn() {
      flushAssistantBuffer();
      if (currentAssistantTurn) {
        if (!currentAssistantMarkdown.trim() && currentAssistantTurn.container.dataset.deliveredFiles) {
          currentAssistantMarkdown = currentAssistantTurn.container.dataset.deliveredFiles === '1'
            ? '已为你准备好文件，见下方附件。'
            : `已为你准备好 ${currentAssistantTurn.container.dataset.deliveredFiles} 个文件，见下方附件。`;
          renderAssistantMarkdown(currentAssistantMsg, currentAssistantMarkdown);
        }
        currentAssistantTurn.actionPanel.classList.remove('is-running');
        if (currentTurnActions.length) {
          currentAssistantTurn.actionDetails.open = false;
          updateActionPanelSummary();
        }
      }
      currentAssistantMsg = null;
      currentAssistantTurn = null;
      thinkingMsg = null;
      thinkingText = '';
    }

    function ensureActionPanel() {
      const turn = ensureAssistantTurn();
      turn.actionPanel.classList.add('active');
      updateActionPanelSummary();
      return turn;
    }

    function updateActionPanelSummary() {
      if (!currentAssistantTurn) return;
      const realActions = currentTurnActions.filter(action => action.type !== 'thinking');
      const running = currentTurnActions.some(action => action.status === 'running');
      const failed = currentTurnActions.some(action => action.status === 'failed');
      const completed = realActions.filter(action => action.status === 'success' || action.status === 'failed').length;

      let text = 'Thinking...';
      if (realActions.length) {
        if (running) text = `Running (${completed}/${realActions.length} steps)`;
        else if (failed) text = `Partially completed (${completed}/${realActions.length} steps)`;
        else text = `Completed (${completed}/${realActions.length} steps)`;
      } else if (currentTurnActions.some(action => action.type === 'thinking')) {
        text = running ? 'Thinking...' : 'Thinking summary';
      }

      currentAssistantTurn.actionSummaryText.textContent = text;
      currentAssistantTurn.actionCount.textContent = realActions.length ? `${realActions.length}` : '';
      currentAssistantTurn.actionPanel.classList.toggle('is-running', running);
    }

    function actionTypeForTool(name) {
      const tool = String(name || '').trim().toLowerCase();
      if (tool === 'exec' || tool.includes('shell') || tool.includes('command')) return 'shell';
      if (tool.includes('search') || tool === 'grep' || tool === 'glob') return 'search';
      if (tool.includes('read')) return 'read';
      if (tool.includes('write')) return 'write';
      if (tool.includes('edit') || tool.includes('patch')) return 'edit';
      return 'tool';
    }

    function fallbackThinkingForTool(tool) {
      const actionType = actionTypeForTool(tool.name || tool.toolName);
      const label = summarizeToolInput(tool.input || tool.name || 'tool call');
      if (actionType === 'shell') return 'Preparing to run a command for verification.';
      if (actionType === 'search') return `Preparing to search${label ? `: ${label}` : ''}.`;
      if (actionType === 'read') return `Preparing to inspect files${label ? `: ${label}` : ''}.`;
      if (actionType === 'write' || actionType === 'edit') return `Preparing to edit content${label ? `: ${label}` : ''}.`;
      return `Preparing to call ${tool.name || 'a tool'}.`;
    }

    function summarizeToolInput(value) {
      const text = typeof value === 'string' ? value : safeStringify(value);
      return text.replace(/\s+/g, ' ').trim().slice(0, 90);
    }

    function safeStringify(value) {
      try {
        return JSON.stringify(value);
      } catch {
        return String(value || '');
      }
    }

    function upsertAction(action) {
      ensureActionPanel();
      const id = action.id || `action-${++currentTurnActionSeq}`;
      const duplicate = findDuplicateCompletedAction(id, action);
      if (duplicate) {
        duplicate.repeat = (duplicate.repeat || 1) + 1;
        duplicate.label = action.label || duplicate.label;
        duplicate.detail = action.detail || duplicate.detail;
        renderActionPanel();
        return duplicate;
      }
      let item = currentTurnActions.find(entry => entry.id === id);
      if (!item) {
        item = {
          id,
          type: action.type || 'tool',
          status: action.status || 'running',
          label: action.label || '',
          detail: action.detail || '',
          detailTitle: action.detailTitle || 'Details',
          repeat: action.repeat || 1,
        };
        currentTurnActions.push(item);
      } else {
        Object.assign(item, action, { id });
      }
      renderActionPanel();
      return item;
    }

    function findDuplicateCompletedAction(id, action) {
      if (currentTurnActions.some(entry => entry.id === id)) return null;
      const type = action.type || 'tool';
      const label = action.label || '';
      const detail = action.detail || '';
      return currentTurnActions.find(entry =>
        entry.type === type &&
        entry.label === label &&
        entry.detail === detail &&
        entry.status === action.status
      ) || null;
    }

    function renderActionPanel() {
      if (!currentAssistantTurn) return;
      currentAssistantTurn.actionList.textContent = '';
      for (const action of currentTurnActions) {
        currentAssistantTurn.actionList.appendChild(createActionItem(action));
      }
      updateActionPanelSummary();
    }

    function createActionItem(action) {
      const item = document.createElement('div');
      item.className = `agent-action-item is-${action.status || 'running'}`;
      item.dataset.actionId = action.id;

      if (action.type === 'thinking') {
        const row = document.createElement('div');
        row.className = 'agent-action-thinking';
        const kind = document.createElement('span');
        kind.className = 'agent-action-thinking-kind';
        kind.textContent = 'THINK';
        const text = document.createElement('span');
        text.className = 'agent-action-thinking-text';
        text.textContent = action.detail || action.label;
        row.appendChild(kind);
        row.appendChild(text);
        item.appendChild(row);
        return item;
      }

      const main = document.createElement('div');
      main.className = 'agent-action-main';
      const kind = document.createElement('span');
      kind.className = 'agent-action-kind';
      kind.textContent = action.type || 'tool';
      const label = document.createElement('span');
      label.className = 'agent-action-label';
      label.textContent = action.label || action.toolName || 'Tool call';
      if (action.repeat > 1) label.textContent += ` x${action.repeat}`;
      label.title = label.textContent;
      const state = document.createElement('span');
      state.className = 'agent-action-state';
      state.textContent = action.status === 'success' ? 'Done' : action.status === 'failed' ? 'Failed' : 'Running';
      main.appendChild(kind);
      main.appendChild(label);
      main.appendChild(state);
      item.appendChild(main);

      if (action.detail) {
        const details = document.createElement('details');
        details.className = 'agent-action-io';
        const summary = document.createElement('summary');
        summary.textContent = action.detailTitle || 'Details';
        const pre = document.createElement('pre');
        pre.textContent = action.detail;
        details.appendChild(summary);
        details.appendChild(pre);
        item.appendChild(details);
      }
      return item;
    }

    function insertReasoningCard(card) {
      if (currentAssistantMsg?.parentNode === messagesEl) {
        messagesEl.insertBefore(card, currentAssistantMsg);
        return;
      }
      messagesEl.appendChild(card);
    }

    function handleThinking(data) {
      const text = normalizeThinkingText(data.fullText || data.text || data.delta || '');
      if (!isUsefulThinkingText(text)) return;

      thinkingText = appendReasoningText(thinkingText, text, data);
      thinkingText = normalizeThinkingText(thinkingText);
      if (!isUsefulThinkingText(thinkingText)) return;
      upsertAction({
        id: currentThinkingActionId(),
        type: 'thinking',
        status: 'running',
        label: 'Thinking summary',
        detail: thinkingText,
      });
      scrollToBottom();
    }

    function clearThinking(options = {}) {
      const action = currentTurnActions.find(item => item.id === currentThinkingActionId());
      if (action) {
        const removeCompleted = options.remove && action.status === 'running';
        if (removeCompleted || !isUsefulThinkingText(thinkingText)) {
          currentTurnActions = currentTurnActions.filter(item => item.id !== currentThinkingActionId());
        } else {
          action.status = 'success';
          action.detail = thinkingText;
        }
        renderActionPanel();
      }
      thinkingMsg = null;
      if (options.remove) thinkingText = '';

    function createReasoningCard() {
      const card = document.createElement('div');

    function updateReasoningCard(card, text, active) {
      const cleanText = normalizeThinkingText(text);
      if (!cleanText) return;
      const badge = card.querySelector('.reasoning-card-badge');
      if (badge) badge.textContent = active ? '进行中' : '已收起';
      const title = card.querySelector('.reasoning-card-title');
      if (title) title.textContent = active ? '思考中' : '思考摘要';
      const preview = card.querySelector('.reasoning-card-preview');
      if (preview) preview.textContent = compactPreview(cleanText);
      const body = card.querySelector('.reasoning-card-body');
      if (body) body.textContent = cleanText;
      card.classList.toggle('active', !!active);
    }

    function appendReasoningText(current, next, data = {}) {
      const normalizedNext = normalizeThinkingText(next);
      if (typeof data.fullText === 'string') return normalizeThinkingText(data.fullText);
      if (data.replace === true) return normalizedNext;
      if (!current) return normalizedNext;
      if (normalizedNext.startsWith(current)) return normalizedNext;
      if (current.endsWith(normalizedNext)) return current;
      return `${current}${normalizedNext}`;
    }

    function normalizeThinkingText(value) {
      return String(value || '')
        .replace(/\r\n/g, '\n')
        .split('\n')
        .map(line => line.trimEnd())
        .filter(line => !isDividerLine(line))
        .join('\n')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    function isUsefulThinkingText(text) {
      if (!text || text.length < 8) return false;
      const compact = text.replace(/\s/g, '');
      if (compact.length < 8) return false;
      const signalChars = compact.replace(/[-_=*#`~|.]/g, '');
      return signalChars.length >= 8;
    }

    function isDividerLine(line) {
      const compact = String(line || '').trim();
      if (!compact) return true;
      return /^[-_=*#`~|.\s]{6,}$/.test(compact);
    }

    function compactPreview(text) {
      return text.replace(/\s+/g, ' ').slice(0, 84);
    }

    function addToolCard(tool) {
      const toolId = tool.id || '';
      const hadCurrentThinking = closeCurrentThinking();
      if (!hadCurrentThinking && !currentTurnActions.some(action => action.type === 'thinking' && action.status === 'running')) {
        upsertAction({
          id: `thinking-for-${toolId || currentTurnActionSeq + 1}`,
          type: 'thinking',
          status: 'success',
          label: 'Thinking summary',
          detail: fallbackThinkingForTool(tool),
        });
      }
      upsertAction({
        id: toolId || `tool-${++currentTurnActionSeq}`,
        type: actionTypeForTool(tool.name),
        status: 'running',
        toolName: tool.name || 'tool',
        label: tool.name || 'tool',
        detail: summarizeToolInput(tool.input || ''),
        detailTitle: 'Input',
      });
      scrollToBottom();
    }

    function closeCurrentThinking() {
      const action = currentTurnActions.find(item => item.id === currentThinkingActionId() && item.status === 'running');
      if (!action) return false;
      action.status = 'success';
      action.detail = thinkingText || action.detail;
      action.id = `thinking-${++currentTurnActionSeq}`;
      thinkingText = '';
      renderActionPanel();
      return true;
    }

    function setConnected(value) {

    function updateSendState() {
      const inlineSlash = canSendInlineSlashCommand();
      sendBtn.disabled = !connected;
      sendBtn.classList.toggle('is-stop', connected && isRunning && !inlineSlash);
      sendBtn.textContent = isRunning && !inlineSlash ? '停止' : '发送';
    }

      updateSendState();

    function updateSessionInfo(data) {
      currentSessionId = data.sessionId || currentSessionId;
      currentSessionIdSource = data.sessionIdSource || currentSessionIdSource;
      currentSessionKey = data.sessionKey || data.sessionId || currentSessionKey;
      if (data.agentType) setAgentSelection(data.agentType, { persist: true });

      if (!data.upload) return;
      uploadLimits.maxCount = data.upload.maxCount || uploadLimits.maxCount;
      uploadLimits.maxFileBytes = data.upload.maxFileBytes || uploadLimits.maxFileBytes;
      uploadLimits.maxTotalBytes = data.upload.maxTotalBytes || uploadLimits.maxTotalBytes;
      uploadLimits.blockedExtensions = Array.isArray(data.upload.blockedExtensions)
        ? data.upload.blockedExtensions.map(ext => ext.toLowerCase())
        : uploadLimits.blockedExtensions;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = reader.result;
          const [, base64] = dataUrl.split(',');
          resolve({
            name: file.name,
            mimeType: file.type || mimeFromName(file.name),
            size: file.size,
            base64,
          });
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function addFiles(files) {
      const incoming = Array.from(files || []);
      if (pendingAttachments.length + incoming.length > uploadLimits.maxCount) {
        addMessage('error', `❌ 单次最多上传 ${uploadLimits.maxCount} 个附件`);
        return;
      }

      for (const file of incoming) {
        const error = validateFile(file);
        if (error) {
          addMessage('error', error);
          continue;
        }

        try {
          const attachment = await fileToBase64(file);
          pendingAttachments.push(attachment);
          addMessage('system', `✅ 附件已就绪: ${file.name}`);
        } catch (err) {
          addMessage('error', `❌ 读取附件失败: ${err.message}`);
        }
      }

      renderAttachments();
    }

    function validateFile(file) {
      const ext = extensionOf(file.name);
      if (ext && uploadLimits.blockedExtensions.includes(ext)) {
        return `❌ 出于安全原因，默认不允许上传 ${ext} 文件: ${file.name}`;
      }
      if (file.size > uploadLimits.maxFileBytes) {
        return `❌ 文件超过 ${formatSize(uploadLimits.maxFileBytes)}: ${file.name}`;
      }
      const totalSize = pendingAttachments.reduce((sum, item) => sum + (item.size || 0), 0) + file.size;
      if (totalSize > uploadLimits.maxTotalBytes) {
        return `❌ 附件总大小超过 ${formatSize(uploadLimits.maxTotalBytes)}`;
      }
      return null;
    }

    function renderAttachments() {
      attachmentBar.textContent = '';
      attachmentBar.classList.toggle('active', pendingAttachments.length > 0);

      for (const [index, file] of pendingAttachments.entries()) {
        const chip = document.createElement('div');
        chip.className = 'attachment-chip';

        if (file.mimeType?.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = `data:${file.mimeType};base64,${file.base64}`;
          img.alt = file.name;
          chip.appendChild(img);
        }

        const name = document.createElement('span');
        name.className = 'attachment-name';
        name.textContent = `${file.name} (${formatSize(file.size)})`;
        chip.appendChild(name);

        const remove = document.createElement('button');
        remove.className = 'remove-btn';
        remove.textContent = '✕';
        remove.addEventListener('click', () => {
          pendingAttachments.splice(index, 1);
          renderAttachments();
        });
        chip.appendChild(remove);

        attachmentBar.appendChild(chip);
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (isRunning && canSendInlineSlashCommand(text)) {
        sendInlineSlashCommand(text);
        return;
      }
      if (isRunning) {
        stopCurrentTask();
        return;
      }
      if (!text && pendingAttachments.length === 0) return;
      if (!connected) {
        addMessage('error', '本地模拟 IM 未连接，请使用 linco-connect start --local-im 启动后再打开测试页。');
        return;
      }

      const files = pendingAttachments.map(a => ({
        name: a.name,
        type: a.mimeType,
        base64: a.base64,
      }));

      const lincoMsg = {
        type: 'inbound_message',
        to: currentAgentType,
        accountId: 'local-mock',
        agentId: 'main',
        chatType: 'direct',
        userId: 'local-test-user',
        messageId: `local-msg-${Date.now()}`,
        sessionKey: currentSessionKey || currentSessionId,
        text,
        files: files.length > 0 ? files : undefined,
      };

      addMessage('user', text || '（附件）', { attachments: pendingAttachments });
      setRunning(true);
      safeSend(lincoMsg);

      pendingAttachments = [];
      renderAttachments();
      inputEl.value = '';
      inputEl.style.height = 'auto';
    }

    function canSendInlineSlashCommand(text = inputEl.value.trim()) {
      return isRunning && String(text || '').trim().startsWith('/') && pendingAttachments.length === 0;
    }

    function sendInlineSlashCommand(text) {
      const normalizedText = String(text || '').trim();
      if (!normalizedText || !connected) return;
      const messageId = `local-msg-${Date.now()}`;
      const streamId = `linco-stream-${messageId}`;
      inlineSlashStreamIds.add(streamId);
      safeSend({
        type: 'inbound_message',
        to: currentAgentType,
        accountId: 'local-mock',
        agentId: 'main',
        chatType: 'direct',
        userId: 'local-test-user',
        messageId,
        streamId,
        sessionKey: currentSessionKey || currentSessionId,
        text: normalizedText,
      });
      addMessage('user', normalizedText);
      inputEl.value = '';
      inputEl.style.height = 'auto';
      updateSendState();
    }

    function sendTextMessage(text) {
      const normalizedText = String(text || '').trim();
      if (!normalizedText) return;
      if (!connected) {
        addMessage('error', '本地模拟 IM 未连接，请先启动本地连接。');
        return;
      }

      const lincoMsg = {
        type: 'inbound_message',
        to: currentAgentType,
        accountId: 'local-mock',
        agentId: 'main',
        chatType: 'direct',
        userId: 'local-test-user',
        messageId: `local-msg-${Date.now()}`,
        sessionKey: currentSessionKey || currentSessionId,
        text: normalizedText,
      };

      addMessage('user', normalizedText);
      setRunning(true);
      safeSend(lincoMsg);
    }

    function stopCurrentTask() {
      if (!connected) return;
      safeSend({
        type: 'stop_turn',
        to: currentAgentType,
        sessionKey: currentSessionKey || currentSessionId,
      });
      sendBtn.disabled = true;
      sendBtn.textContent = '停止中...';
    }

    function safeSend(payload) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        addMessage('error', '本地模拟 IM 未连接，请使用 linco-connect start --local-im 启动后再打开测试页。');
        return;
      }
      ws.send(JSON.stringify(payload));
    }

    function appendAssistantChunk(text) {
      ensureAssistantTurn();
      assistantBuffer += text || '';
      if (assistantFrame) return;
      assistantFrame = requestAnimationFrame(() => {
        currentAssistantMarkdown += assistantBuffer;
        assistantBuffer = '';
        renderAssistantMarkdown(currentAssistantMsg, currentAssistantMarkdown);
        assistantFrame = null;
        scrollToBottom();
      });
    }

    function flushAssistantBuffer() {
      if (assistantFrame) {
        cancelAnimationFrame(assistantFrame);
        assistantFrame = null;
      }
      if (currentAssistantMsg && assistantBuffer) {
        currentAssistantMarkdown += assistantBuffer;
        assistantBuffer = '';
        renderAssistantMarkdown(currentAssistantMsg, currentAssistantMarkdown);
        scrollToBottom();
      }
    }

    function loadAgentTypeFromUrlOrStorage() {
      const params = new URLSearchParams(location.search);
      return normalizeAgentType(params.get('agentType') || localStorage.getItem('linco.agentType') || 'claude');
    }

    function normalizeAgentType(value) {
      const type = String(value || 'claude').trim().toLowerCase();
      return ['claude', 'codex', 'hermes', 'openclaw'].includes(type) ? type : 'claude';
    }

    function agentLabel(type) {
      return type === 'codex' ? 'Codex' : type === 'hermes' ? 'Hermes' : type === 'openclaw' ? 'OpenClaw' : 'Claude Code';
    }

    function setAgentSelection(agentType, options = {}) {
      currentAgentType = normalizeAgentType(agentType);
      if (agentSelect.value !== currentAgentType) agentSelect.value = currentAgentType;
      if (options.persist !== false) localStorage.setItem('linco.agentType', currentAgentType);
    }

    function initializeAgentSelector(config = {}) {
      if (Array.isArray(config.agents) && config.agents.length > 0) {
        agentSelect.innerHTML = '';
        for (const agent of config.agents) {
          const option = document.createElement('option');
          option.value = normalizeAgentType(agent.type);
          option.textContent = agent.label || agentLabel(option.value);
          agentSelect.appendChild(option);
        }
      }

      const params = new URLSearchParams(location.search);
      const selected = params.get('agentType') || localStorage.getItem('linco.agentType') || config.defaultLocalAgent || currentAgentType;
      setAgentSelection(selected);
    }

    function handleAgentChange() {
      const nextAgent = normalizeAgentType(agentSelect.value);
      if (nextAgent === currentAgentType && ws?.readyState === WebSocket.OPEN) return;
      setAgentSelection(nextAgent);
      currentSessionId = '';
      currentSessionIdSource = '';
      addMessage('system', `已切换到 ${agentLabel(nextAgent)}，本地测试会话正在重新连接...`);
      reconnectWebSocketNow();
    }

    function reconnectWebSocketNow() {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
      const currentWs = ws;
      ws = null;
      if (currentWs && currentWs.readyState !== WebSocket.CLOSED) {
        currentWs.onclose = null;
        currentWs.close();
      }
      setConnected(false);
      connectWebSocket();
    }

    function loadLocalToken() {
      const params = new URLSearchParams(location.search);
      const tokenFromUrl = params.get('localToken') || params.get('token') || '';
      const token = tokenFromUrl || localStorage.getItem('linco.localToken') || '';
      if (token) localStorage.setItem('linco.localToken', token);
      if (tokenFromUrl) hideLocalTokenFromAddressBar(params);
      return token;
    }

    function hideLocalTokenFromAddressBar(params) {
      params.delete('localToken');
      params.delete('token');
      const nextUrl = `${location.pathname}${params.toString() ? `?${params}` : ''}${location.hash}`;
      history.replaceState(null, '', nextUrl);
    }

    function ensureLocalTokenForUi() {
      if (localToken) return true;
      addMessage('error', '❌ 缺少本地访问 token，请使用 linco-connect start 输出的本地测试页地址打开。');
      return false;
    }

    function withLocalToken(urlString) {
      const url = new URL(urlString, location.href);
      if (url.protocol !== 'http:' && url.protocol !== 'https:') return url.toString();
      if (url.host !== location.host) return url.toString();
      if (localToken) url.searchParams.set('localToken', localToken);
      return url.toString();
    }

    function objectUrlFromBase64(base64, mimeType) {
      const cleanBase64 = String(base64 || '').replace(/\s/g, '');
      const binary = atob(cleanBase64);
      const chunks = [];
      const chunkSize = 8192;

      for (let offset = 0; offset < binary.length; offset += chunkSize) {
        const slice = binary.slice(offset, offset + chunkSize);
        const bytes = new Uint8Array(slice.length);
        for (let i = 0; i < slice.length; i += 1) {
          bytes[i] = slice.charCodeAt(i);
        }
        chunks.push(bytes);
      }

      const blob = new Blob(chunks, { type: mimeType || 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      outgoingObjectUrls.add(url);
      return url;
    }

    async function loadClientConfig() {
      if (!ensureLocalTokenForUi()) return {};
      try {
        const res = await fetch('/api/client-config', {
          cache: 'no-store',
          headers: {
            Authorization: `Bearer ${localToken}`,
          },
        });
        if (!res.ok) return {};
        return await res.json();
      } catch {
        return {};
      }
    }

    function defaultWebSocketUrl() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${protocol}//${location.host}`;
    }

    function pageSessionId() {
      const params = new URLSearchParams(location.search);
      return params.get('session_id') || params.get('sessionId') || currentSessionId || '';
    }

    function websocketUrlWithSessionId(wsUrl) {
      const url = new URL(wsUrl, location.href);
      const sessionId = pageSessionId();
      if (sessionId) url.searchParams.set('session_id', sessionId);
      url.searchParams.set('agentType', currentAgentType);
      url.searchParams.set('linco', '1');
      if (localToken && url.host === location.host) url.searchParams.set('localToken', localToken);
      return url.toString();
    }

    async function initLocalTestPage() {
      const config = await loadClientConfig();
      initializeAgentSelector(config);
      if (!config.localImEnabled) {
        setConnected(false);
        addMessage('system', '本地模拟 IM 默认关闭。需要测试本地前端 IM 时，请使用 linco-connect start --local-im 启动。');
        return;
      }
      connectWebSocket(config);
    }

    async function connectWebSocket(config) {
      if (!ensureLocalTokenForUi()) return;
      const clientConfig = config || await loadClientConfig();
      initializeAgentSelector(clientConfig);
      if (!clientConfig.localImEnabled) {
        setConnected(false);
        return;
      }
      ws = new WebSocket(websocketUrlWithSessionId(clientConfig.wsUrl || defaultWebSocketUrl()));
      ws.onmessage = handleSocketMessage;
      ws.onopen = () => setConnected(true);
      ws.onclose = () => {
        setConnected(false);
        setRunning(false);
        addMessage('system', '⚠️ 连接已断开，正在尝试重连...');
        reconnectTimer = setTimeout(connectWebSocket, 3000);
      };
      ws.onerror = () => {
        setConnected(false);
        setRunning(false);
      };
    }

    function handleSocketMessage(event) {
      let data;
      try {
        data = JSON.parse(event.data);
      } catch {
        addMessage('error', '❌ 收到无法解析的服务端消息');
        return;
      }

      switch (data.type) {
        case 'session_info':
          updateSessionInfo(data);
          break;
        case 'turn_start':
          setRunning(true);
          break;
        case 'turn_end':
          if (!consumeInlineSlashTurnEnd(data)) {
            clearThinking();
            completeAssistantTurn();
            setRunning(false);
          }
          break;
        case 'outbound_message':
          if (data.mediaName) {
            let fileUrl = data.mediaUrl || '#';
            if (data.mediaBase64) {
              try {
                fileUrl = objectUrlFromBase64(data.mediaBase64, data.mediaType);
              } catch {
                addOutgoingAttachment({
                  name: data.mediaName,
                  error: '文件数据解析失败，无法预览或下载。',
                });
                break;
              }
            }
            addOutgoingAttachment({
              name: data.mediaName,
              mimeType: data.mediaType,
              url: fileUrl,
              size: data.size || 0,
              kind: data.mediaType?.startsWith('image/') ? 'image' : 'file',
            });
          } else {
            const msgType = data.messageId?.includes('error') ? 'error' : 'system';
            addMessage(msgType, data.text || '', {
              actions: data.actions,
              quickActions: data.quickActions,
              quickReplies: data.quickReplies,
            });
          }
          break;
        case 'slash_command_result':
          addSlashCommandResult(data);
          break;
        case 'stream_chunk':
          handleStreamChunk(data);
          break;
        case 'thinking':
          handleThinking(data);
          break;
        case 'thinking_clear':
          clearThinking({ remove: true });
          break;
        case 'tool_call':
          addToolCard(data);
          break;
        case 'tool_result':
          addToolResult(data);
          break;
        case 'permission_request':
          addPermissionConfirm(data);
          break;
        case 'danger_warning':
          setRunning(false);
          addDangerConfirm(data.text || '需要确认操作');
          break;
        case 'presence_event':
          addPresenceMessage(data);
          break;
        case 'pong':
          break;
        default:
          console.log('[WS] 未处理消息类型:', data.type, data);
      }
    }

    function consumeInlineSlashTurnEnd(data) {
      const streamId = data.streamId || data.stream_id || '';
      if (!streamId || !inlineSlashStreamIds.has(streamId)) return false;
      inlineSlashStreamIds.delete(streamId);
      updateSendState();
      return isRunning;
    }

    function handleStreamChunk(data) {
      if (data.done) {
        completeAssistantTurn();
        setRunning(false);
      } else {
        clearThinking();
        appendAssistantChunk(data.delta || '');
      }
    }

    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      addFiles(e.target.files);
      fileInput.value = '';
    });

    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const images = [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) images.push(file);
        }
      }
      if (images.length > 0) {
        e.preventDefault();
        addFiles(images);
      }
    });

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (isRunning && !canSendInlineSlashCommand()) return;
        sendMessage();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      updateSendState();
    });

    agentSelect.addEventListener('change', handleAgentChange);
    setAgentSelection(currentAgentType, { persist: false });
    initLocalTestPage();

    function extensionOf(name) {
      const idx = name.lastIndexOf('.');
      return idx >= 0 ? name.slice(idx).toLowerCase() : '';
    }

    function mimeFromName(name) {
      switch (extensionOf(name)) {
        case '.png': return 'image/png';
        case '.jpg':
        case '.jpeg': return 'image/jpeg';
        case '.gif': return 'image/gif';
        case '.webp': return 'image/webp';
        case '.txt': return 'text/plain';
        case '.md': return 'text/markdown';
        case '.csv': return 'text/csv';
        case '.sql': return 'application/sql';
        case '.pdf': return 'application/pdf';
        case '.doc': return 'application/msword';
        case '.docx': return 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
        case '.xls': return 'application/vnd.ms-excel';
        case '.xlsx': return 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
        case '.json': return 'application/json';
        case '.xml': return 'application/xml';
        case '.zip': return 'application/zip';
        default: return 'application/octet-stream';
      }
    }

    function formatSize(size) {
      if (!Number.isFinite(size) || size <= 0) return '0 KB';
      if (size >= 1024 * 1024) return `${(size / 1024 / 1024).toFixed(1)} MB`;
      return `${(size / 1024).toFixed(1)} KB`;
    }
  </script>
</body>
