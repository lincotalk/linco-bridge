<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linco Local Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="chat-container">
    <div id="header">
      <span id="header-title">Linco Local Agent</span>
      <span id="status-dot" title="Connection status"></span>
      <select id="agent-select" title="Select local test Agent">
        <option value="claude">Claude Code</option>
        <option value="codex">Codex</option>
        <option value="hermes">Hermes</option>
        <option value="openclaw">OpenClaw</option>
      </select>
    </div>
    <div id="messages"></div>
    <div id="attachment-bar"></div>
    <div id="input-area">
      <button id="upload-btn" class="icon-btn" title="Attach files">+</button>
      <input type="file" id="file-input" multiple hidden>
      <textarea id="input" rows="2" placeholder="Ask a question or type /help"></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
